# xfrpc UCI configuration
# Generates TOML config (frp-compatible) for xfrpc at /var/etc/xfrpc.toml
config xfrpc 'common'
	option enabled 0
	option loglevel 7
	option server_addr frps.wifidogx.online
	option server_port 7000
	option token 'your_auth_token'
	# option tcp_mux 1
	# option protocol tcp
	# option quic_bind_port 7002
	# option heartbeat_interval 30
	# option heartbeat_timeout 90
	# option tls_enable 1
	# option tls_cert_file /etc/xfrpc/client.crt
	# option tls_key_file /etc/xfrpc/client.key
	# option tls_trusted_ca_file /etc/xfrpc/ca.crt
	# option tls_server_name frps.wifidogx.online

config tcp 'ssh01'
	option local_ip 127.0.0.1
	option local_port 22
	option remote_port 6000
